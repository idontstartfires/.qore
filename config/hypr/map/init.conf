# Exit session
bind = SUPER SHIFT, end, exit
# Kill client
bind = SUPER SHIFT, Q, killactive

# Bluetooth connection
bind = SUPER,       B, exec, blue connect $(blue devices | wofi --dmenu) && notify-send "$(blue name) 󰂱"
bind = SUPER CTRL,  B, exec, blue reconnect $(blue name)
bind = SUPER SHIFT, B, exec, blue disconnect $(blue name) && notify-send "$(blue name) 󰂲"
bind = SUPER ALt  , B, exec, notify-send "$(blue name): $(blue battery)%󰥉"

bind = SUPER, left, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = SUPER, right, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%

bind = SUPER, up, exec, brightnessctl set 1%+
bind = SUPER, down, exec, brightnessctl set 1%-

bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER, Y, togglefloating, 

bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, H, swapwindow, l
bind = SUPER SHIFT, L, swapwindow, r
bind = SUPER SHIFT, K, swapwindow, u
bind = SUPER SHIFT, J, swapwindow, d

bindm=SUPER,mouse:273,resizewindow
binde=SUPER CTRL,L,resizeactive,10 0
binde=SUPER CTRL,H,resizeactive,-10 0
binde=SUPER CTRL,K,resizeactive,0 -10
binde=SUPER CTRL,J,resizeactive,0 10

bindm=SUPER,mouse:272,movewindow
binde=SUPER SHIFT,L,moveactive,20 0
binde=SUPER SHIFT,H,moveactive,-20 0
binde=SUPER SHIFT,K,moveactive,0 -20
binde=SUPER SHIFT,J,moveactive,0 20


bind = SUPER, w, exec, pkill hyprpaper && hyprpaper

source = $conf/map/launch.conf
source = $conf/map/project.conf
