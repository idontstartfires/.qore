#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio          = [ 0, 3, 5 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[opener]
edit = [ { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true } ]
open = [ { run = 'xdg-open "$@"', desc = "Open" } ]
extract = [ { run = 'ouch decompress --yes "$1"', desc = "Extract here" } ]
web-browser = [ { run = '$BROWSER "$1"', orphan = true, desc = "Web Browser" } ]

image-view-version-sorted = [ { 
    run = 'fd -t f --exec-batch file --mime-type | rg "image/" | cut -d: -f1 | sort -V | imv -n "$1" --', 
    orphan = true, desc = "View Images" 
} ]
image-view-random-sorted = [ {
    run = 'fd -t f --exec-batch file --mime-type | rg "image/" | cut -d: -f1 | shuf | imv -n "$1" --',
    orphan = true, desc = "View Images Randomly" 
} ]

play = [ { run = 'mpv --mute --loop "$@"', orphan = true, desc = "mpv" } ]

sh = [ { run = 'sh "$@"', orphan = true, desc = "Run Script" } ]
exe = [ { run = './"$1"', orphan = true, desc = "Execute" } ]
wine = [ { run = 'wine "$@"', desc = "Wine" } ]

zathura = [ { run = 'zathura -- "$@"', orphan = true, desc = "Zathura" } ]
pdftoppm = [ { run = 'mkdir "${1%.*}" && pdftoppm -jpeg "$1" "${1%.*}/"', desc = "PDF -> JPEG" } ]

to-html = [ { run = 'abiword --to=html "$@"', desc = "Text -> HTML" } ]

[open]
rules = [
    { url = "*/", use = [ "image-view-version-sorted", "image-view-random-sorted" ] },
    { mime = "text/x-shellscript", use = [ "edit", "sh" ] },
    { url = "*.sh", use = [ "edit", "sh" ] },
    { mime = "text/html", use = [ "edit", "web-browser" ] },
    { url = "*.{doc,docx,odt,rtf}", use = [ "to-html" ] },
    { url = "*.txt", use = [ "edit", "to-html" ] },

    { url = "*.gif", use = [ "play", "image-view-version-sorted", "image-view-random-sorted" ] },
    { mime = "image/*", use = [ "image-view-version-sorted", "image-view-random-sorted" ] },
    { mime = "video/*", use = [ "play" ] },
    { mime = "audio/*", use = [ "play" ] },
    { mime = "inode/x-empty", use = [ "edit" ] },

    { mime = "application/json", use = [ "edit" ] },
    { mime = "*/javascript", use = [ "edit" ] },

    { mime = "application/pdf", use = [ "zathura", "pdftoppm" ] },

    { url = "*.{zip,7z,rar,tar.bz2,tar.gz}", use = [ "extract" ] },

    { mime = "application/x-executable", use = [ "exe" ] },
    { mime = "application/vnd.microsoft.portable-executable", use = [ "wine" ] },
    # Fixed this reference from "doc-html" to "to-html"
    { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", use = [ "to-html" ] },
    
    { mime = "text/*", use = [ "edit" ] },
    { mime = "*", use = [ "edit", "open" ] },
]

[tasks]
micro_workers    = 5
macro_workers    = 4
bizarre_retry    = 5
image_alloc      = 536870912  # 512MB
image_bound      = [ 0, 0 ]
suppress_preload = false

[plugins]
preload = []

[input]
# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# trash
trash_title 	= "Move {n} selected file{s} to trash? (y/N)"
trash_origin	= "top-center"
trash_offset	= [ 0, 2, 50, 3 ]

# delete
delete_title 	= "Delete {n} selected file{s} permanently? (y/N)"
delete_origin	= "top-center"
delete_offset	= [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

# overwrite
overwrite_title  = "Overwrite an existing file? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [ 0, 2, 50, 3 ]

# quit
quit_title  = "{n} task{s} running, sure to quit? (y/N)"
quit_origin = "top-center"
quit_offset = [ 0, 2, 50, 3 ]

[select]
open_title  = "Open"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[log]
enabled = false
